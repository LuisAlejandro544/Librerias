name: Publish
on:
  push:
    branches:
      - main
    paths:
      - 'librerias/kotlite/**'
      - '.github/workflows/publish.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Publish package
        working-directory: ./librerias/kotlite
        run: npx jsr publish
